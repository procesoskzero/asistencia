<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Presentismo — KZero</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f5f2;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --border-md: rgba(0,0,0,0.14);
    --text: #1a1a18;
    --muted: #6b6b67;
    --hint: #a0a09c;
    --green: #1d9e75;
    --green-bg: #e1f5ee;
    --red: #d85a30;
    --red-bg: #faece7;
    --amber: #ba7517;
    --amber-bg: #faeeda;
    --blue: #185fa5;
    --blue-bg: #e6f1fb;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
  
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .brand { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .brand span { color: var(--muted); font-weight: 400; }
  .updated { font-size: 12px; color: var(--hint); font-family: 'DM Mono', monospace; }

  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; padding: 20px 24px 0; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .metric-value { font-size: 26px; font-weight: 600; letter-spacing: -1px; line-height: 1; }
  .metric-value.g { color: var(--green); }
  .metric-value.r { color: var(--red); }
  .metric-value.b { color: var(--blue); }

  .filters { display: flex; gap: 8px; padding: 16px 24px; flex-wrap: wrap; align-items: center; }
  .filters select, .filters input {
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    border: 1px solid var(--border-md); border-radius: 8px;
    padding: 6px 12px; background: var(--surface); color: var(--text);
    outline: none; cursor: pointer;
  }
  .filters select:focus, .filters input:focus { border-color: var(--blue); }
  .filters input { width: 200px; }
  .filter-label { font-size: 12px; color: var(--muted); }

  .table-wrap { padding: 0 24px 40px; overflow-x: auto; }
  table { width: 100%; table-layout: fixed; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); font-size: 13px; }
  
  td.name { max-width: 220px; }
  td.leg { width: 80px; }
  td.turno { width: 90px; }
  td.fi { width: 110px; }
  thead th {
    background: #f0ede8; font-weight: 500; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted);
    padding: 10px 12px; white-space: nowrap; border-bottom: 1px solid var(--border-md);
    position: sticky; top: 56px;
  }
  thead th.day { text-align: center; width: 36px; padding: 10px 4px; }
  thead th.day.weekend { background: #ebe8e2; }

  .sector-row td { background: #f8f6f2; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); padding: 8px 12px; border-top: 1px solid var(--border-md); }
  .sector-count { font-weight: 400; color: var(--hint); margin-left: 6px; }

  tbody tr.emp { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr.emp:hover { background: #fafaf8; }
  td { padding: 8px 12px; vertical-align: middle; }
  td.name { font-weight: 500; width: 30%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  td.leg { width: 70px; }
  td.turno { width: 90px; }
  td.fi { width: 100px; }
  td.leg { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
  td.turno { color: var(--muted); white-space: nowrap; }
  td.fi { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--hint); }
  td.day-cell { text-align: center; padding: 8px 2px; }

  .dot-aus { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--red-bg); color: var(--red); font-size: 12px; font-weight: 600; }
  .dot-gest { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--green-bg); color: var(--green); font-size: 12px; font-weight: 600; }
  .dot-ok { color: var(--border-md); font-size: 14px; }

  .badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 5px; font-weight: 600; letter-spacing: 0.03em; }
  .badge-t1 { background: var(--blue-bg); color: var(--blue); }
  .badge-t2 { background: var(--amber-bg); color: var(--amber); }

  #no-data { text-align: center; padding: 48px; color: var(--hint); font-size: 13px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Presentismo <span>/ KZero</span></div>
  <div class="updated">Actualizado: 05/05/2026 09:44</div>
</div>

<div class="metrics">
  <div class="metric"><div class="metric-label">Dotaci&oacute;n</div><div class="metric-value b" id="m-dot">-</div></div>
  <div class="metric"><div class="metric-label">Ausentes hoy</div><div class="metric-value r" id="m-aus">-</div></div>
  <div class="metric"><div class="metric-label">Gestionados</div><div class="metric-value g" id="m-gest">-</div></div>
  <div class="metric"><div class="metric-label">Pendientes</div><div class="metric-value r" id="m-pend">-</div></div>
  <div class="metric"><div class="metric-label">% Presentismo</div><div class="metric-value" id="m-pct">-</div></div>
</div>

<div class="filters">
  <span class="filter-label">Filtrar:</span>
  <input type="text" id="f-nombre" placeholder="Buscar nombre o legajo...">
  <select id="f-sector"><option value="">Todos los sectores</option></select>
  <select id="f-turno"><option value="">Todos los turnos</option><option>Turno 1</option><option>Turno 2</option></select>
</div>

<div class="table-wrap">
  <table id="tabla">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="no-data" style="display:none">Sin resultados para los filtros seleccionados.</div>
</div>

<script>
var FECHAS = ["2026-05-02","2026-05-04","2026-05-05"];
var ROWS   = [];

var DIAS_ES = ['Dom','Lun','Mar','Mar','Jue','Vie','S\u00e1b'];

function parseDate(s) {
  var p = s.split('-');
  return new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
}

function buildHeader() {
  var cg = document.getElementById("colgroup");
  cg.innerHTML = "<col class='c-name'><col class='c-leg'><col class='c-turno'><col class='c-fi'>" + FECHAS.map(function(){ return "<col class='c-day'>"; }).join("");
  var hoy = new Date(); hoy.setHours(0,0,0,0);
  var todayStr = hoy.getFullYear() + '-' + String(hoy.getMonth()+1).padStart(2,'0') + '-' + String(hoy.getDate()).padStart(2,'0');
  var html = '<tr><th class="col-name">Empleado</th><th class="col-leg">Legajo</th><th class="col-turno">Turno</th><th class="col-fi">Ingreso</th>';
  for (var i=0; i<FECHAS.length; i++) {
    var f = FECHAS[i];
    var d = parseDate(f);
    var dow = d.getDay();
    var isWeekend = dow === 0 || dow === 6;
    var isHoy = f === todayStr;
    var dia = d.getDate();
    var diaLabel = isHoy ? '<b style="color:#185fa5">' + dia + '</b>' : dia;
    html += '<th class="day' + (isWeekend?' weekend':'') + '">' + diaLabel + '<br><span style="font-size:9px">' + DIAS_ES[dow] + '</span></th>';
  }
  html += '</tr>';
  document.getElementById('thead').innerHTML = html;
}

function getSectores() {
  var s = {};
  for (var i=0; i<ROWS.length; i++) { if (ROWS[i].sector) s[ROWS[i].sector] = 1; }
  return Object.keys(s).sort();
}

function buildFilters() {
  var sel = document.getElementById('f-sector');
  var secs = getSectores();
  for (var i=0; i<secs.length; i++) {
    var o = document.createElement('option');
    o.value = secs[i]; o.textContent = secs[i];
    sel.appendChild(o);
  }
}

function render() {
  var hoy = new Date(); hoy.setHours(0,0,0,0);
  var todayStr = hoy.getFullYear() + '-' + String(hoy.getMonth()+1).padStart(2,'0') + '-' + String(hoy.getDate()).padStart(2,'0');
  var fNombre = document.getElementById('f-nombre').value.toLowerCase();
  var fSector = document.getElementById('f-sector').value;
  var fTurno  = document.getElementById('f-turno').value;

  var filtered = ROWS.filter(function(r) {
    return (!fNombre || r.nombre.toLowerCase().indexOf(fNombre) >= 0 || r.legajo.indexOf(fNombre) >= 0) &&
           (!fSector || r.sector === fSector) &&
           (!fTurno  || r.turno === fTurno);
  });

  var sectMap = {};
  for (var i=0; i<filtered.length; i++) {
    var sec = filtered[i].sector;
    if (!sectMap[sec]) sectMap[sec] = [];
    sectMap[sec].push(filtered[i]);
  }
  var sectores = Object.keys(sectMap).sort();

  var html = '';
  for (var s=0; s<sectores.length; s++) {
    var sec = sectores[s];
    var filas = sectMap[sec].sort(function(a,b){ return parseInt(a.legajo) - parseInt(b.legajo); });
    html += '<tr class="sector-row"><td colspan="' + (4 + FECHAS.length) + '">' + sec + '<span class="sector-count">' + filas.length + ' personas</span></td></tr>';
    for (var r=0; r<filas.length; r++) {
      var row = filas[r];
      var badgeClass = row.turno === 'Turno 1' ? 'badge-t1' : 'badge-t2';
      html += '<tr class="emp"><td class="name" title="' + row.nombre + '">' + row.nombre + '</td>';
      html += '<td class="leg">' + row.legajo + '</td>';
      html += '<td class="turno"><span class="badge ' + badgeClass + '">' + row.turno + '</span></td>';
      html += '<td class="fi">' + (row.fi || '-') + '</td>';
      for (var f=0; f<FECHAS.length; f++) {
        var fecha = FECHAS[f];
        if (fecha in row.aus) {
          var gest = row.aus[fecha];
          html += '<td class="day-cell">' + (gest ? '<span class="dot-gest">&#10003;</span>' : '<span class="dot-aus">&#10007;</span>') + '</td>';
        } else {
          html += '<td class="day-cell"><span class="dot-ok">&middot;</span></td>';
        }
      }
      html += '</tr>';
    }
  }

  var tbody = document.getElementById('tbody');
  var noData = document.getElementById('no-data');
  if (filtered.length === 0) {
    tbody.innerHTML = '';
    noData.style.display = 'block';
  } else {
    tbody.innerHTML = html;
    noData.style.display = 'none';
  }

  var dotacion = filtered.length;
  var ausHoy = 0, gestHoy = 0;
  for (var i=0; i<filtered.length; i++) {
    if (todayStr in filtered[i].aus) {
      ausHoy++;
      if (filtered[i].aus[todayStr]) gestHoy++;
    }
  }
  var pendHoy = ausHoy - gestHoy;
  var pct = dotacion > 0 ? ((dotacion - ausHoy) / dotacion * 100).toFixed(1) + '%' : '-';

  document.getElementById('m-dot').textContent  = dotacion;
  document.getElementById('m-aus').textContent  = ausHoy;
  document.getElementById('m-gest').textContent = gestHoy;
  document.getElementById('m-pend').textContent = pendHoy;
  document.getElementById('m-pct').textContent  = pct;
}

buildHeader();
buildFilters();
render();

document.getElementById('f-nombre').addEventListener('input', render);
document.getElementById('f-sector').addEventListener('change', render);
document.getElementById('f-turno').addEventListener('change', render);
</script>
</body>
</html>
