<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Presentismo — KZero</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f5f2;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --border-md: rgba(0,0,0,0.14);
    --text: #1a1a18;
    --muted: #6b6b67;
    --hint: #a0a09c;
    --green: #1d9e75;
    --green-bg: #e1f5ee;
    --red: #d85a30;
    --red-bg: #faece7;
    --amber: #ba7517;
    --amber-bg: #faeeda;
    --blue: #185fa5;
    --blue-bg: #e6f1fb;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
  
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .brand { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .brand span { color: var(--muted); font-weight: 400; }
  .updated { font-size: 12px; color: var(--hint); font-family: 'DM Mono', monospace; }

  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; padding: 20px 24px 0; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .metric-value { font-size: 26px; font-weight: 600; letter-spacing: -1px; line-height: 1; }
  .metric-value.g { color: var(--green); }
  .metric-value.r { color: var(--red); }
  .metric-value.b { color: var(--blue); }

  .filters { display: flex; gap: 8px; padding: 16px 24px; flex-wrap: wrap; align-items: center; }
  .filters select, .filters input {
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    border: 1px solid var(--border-md); border-radius: 8px;
    padding: 6px 12px; background: var(--surface); color: var(--text);
    outline: none; cursor: pointer;
  }
  .filters select:focus, .filters input:focus { border-color: var(--blue); }
  .filters input { width: 200px; }
  .filter-label { font-size: 12px; color: var(--muted); }

  .table-wrap { padding: 0 24px 40px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); font-size: 13px; }
  
  thead th {
    background: #f0ede8; font-weight: 500; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted);
    padding: 10px 12px; white-space: nowrap; border-bottom: 1px solid var(--border-md);
    position: sticky; top: 56px;
  }
  thead th.day { text-align: center; width: 36px; padding: 10px 4px; }
  thead th.day.weekend { background: #ebe8e2; }

  .sector-row td { background: #f8f6f2; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); padding: 8px 12px; border-top: 1px solid var(--border-md); }
  .sector-count { font-weight: 400; color: var(--hint); margin-left: 6px; }

  tbody tr.emp { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr.emp:hover { background: #fafaf8; }
  td { padding: 8px 12px; vertical-align: middle; }
  td.name { font-weight: 500; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  td.leg { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
  td.turno { color: var(--muted); white-space: nowrap; }
  td.fi { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--hint); }
  td.day-cell { text-align: center; padding: 8px 2px; }

  .dot-aus { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--red-bg); color: var(--red); font-size: 12px; font-weight: 600; }
  .dot-gest { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--green-bg); color: var(--green); font-size: 12px; font-weight: 600; }
  .dot-ok { color: var(--border-md); font-size: 14px; }

  .badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 5px; font-weight: 600; letter-spacing: 0.03em; }
  .badge-t1 { background: var(--blue-bg); color: var(--blue); }
  .badge-t2 { background: var(--amber-bg); color: var(--amber); }

  #no-data { text-align: center; padding: 48px; color: var(--hint); font-size: 13px; }
</style>
</head>

<div class="topbar">

function buildHeader() {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const todayStr = hoy.toISOString().split('T')[0];
  let html = '<tr><th>Empleado</th><th>Legajo</th><th>Turno</th><th>Ingreso</th>';
  FECHAS.forEach(f => {
    const d = parseDate(f);
    const dow = d.getDay();
    const isWeekend = dow === 0 || dow === 6;
    const isHoy = f === todayStr;
    const dia = d.getDate();
    const label = isHoy ? <span style="color:#185fa5;font-weight:700"></span><br><span style="font-size:9px"></span> : ${dia}<br><span style="font-size:9px"></span>;
    html += <th class="day"></th>;
  });
  html += '</tr>';
  document.getElementById('thead').innerHTML = html;
}

function getSectores() {
  const s = new Set(ROWS.map(r => r.sector).filter(Boolean));
  return [...s].sort();
}

function buildFilters() {
  const sel = document.getElementById('f-sector');
  getSectores().forEach(s => {
    const o = document.createElement('option'); o.value = s; o.textContent = s;
    sel.appendChild(o);
  });
}

function render() {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const todayStr = hoy.toISOString().split('T')[0];
  const fNombre = document.getElementById('f-nombre').value.toLowerCase();
  const fSector = document.getElementById('f-sector').value;
  const fTurno  = document.getElementById('f-turno').value;

  const filtered = ROWS.filter(r =>
    (!fNombre || r.nombre.toLowerCase().includes(fNombre) || r.legajo.includes(fNombre)) &&
    (!fSector || r.sector === fSector) &&
    (!fTurno  || r.turno === fTurno)
  );

  const sectores = [...new Set(filtered.map(r => r.sector))].sort();
  let html = '';

  sectores.forEach(sec => {
    const filas = filtered.filter(r => r.sector === sec);
    html += <tr class="sector-row"><td colspan=""><span class="sector-count"> personas</span></td></tr>;
    filas.sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(r => {
      const badgeClass = r.turno === 'Turno 1' ? 'badge-t1' : 'badge-t2';
      html += <tr class="emp">
        <td class="name" title=""></td>
        <td class="leg"></td>
        <td class="turno"><span class="badge "></span></td>
        <td class="fi"></td>;
      FECHAS.forEach(f => {
        if (f in r.aus) {
          const gest = r.aus[f];
          html += <td class="day-cell"></td>;
        } else {
          html += <td class="day-cell"><span class="dot-ok">·</span></td>;
        }
      });
      html += '</tr>';
    });
  });

  const tbody = document.getElementById('tbody');
  const noData = document.getElementById('no-data');
  if (filtered.length === 0) {
    tbody.innerHTML = '';
    noData.style.display = 'block';
  } else {
    tbody.innerHTML = html;
    noData.style.display = 'none';
  }

  // Métricas del día de hoy
  const dotacion = new Set(filtered.map(r => r.legajo)).size;
  const ausHoy = filtered.filter(r => todayStr in r.aus).length;
  const gestHoy = filtered.filter(r => todayStr in r.aus && r.aus[todayStr]).length;
  const pendHoy = ausHoy - gestHoy;
  const pct = dotacion > 0 ? ((dotacion - ausHoy) / dotacion * 100).toFixed(1) : '—';

  document.getElementById('m-dot').textContent  = dotacion;
  document.getElementById('m-aus').textContent  = ausHoy;
  document.getElementById('m-gest').textContent = gestHoy;
  document.getElementById('m-pend').textContent = pendHoy;
  document.getElementById('m-pct').textContent  = pct !== '—' ? pct + '%' : '—';
}

buildHeader();
buildFilters();
render();

document.getElementById('f-nombre').addEventListener('input', render);
document.getElementById('f-sector').addEventListener('change', render);
document.getElementById('f-turno').addEventListener('change', render);
</script>
</body>
</html>
