<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  .brand span { color: var(--muted); font-weight: 400; }
  .updated { font-size: 12px; color: var(--hint); font-family: 'DM Mono', monospace; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; padding: 20px 24px 0; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .metric-value { font-size: 26px; font-weight: 600; letter-spacing: -1px; line-height: 1; }
  .metric-value.g { color: var(--green); } .metric-value.r { color: var(--red); } .metric-value.b { color: var(--blue); }
  .filters { display: flex; gap: 8px; padding: 16px 24px; flex-wrap: wrap; align-items: center; }
  .filters select, .filters input { font-family: 'DM Sans', sans-serif; font-size: 13px; border: 1px solid var(--border-md); border-radius: 8px; padding: 6px 12px; background: var(--surface); color: var(--text); outline: none; cursor: pointer; }
  .filters input { width: 200px; }
  .filter-label { font-size: 12px; color: var(--muted); }
  .table-wrap { padding: 0 24px 40px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); font-size: 13px; }
  thead th { background: #f0ede8; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); padding: 10px 12px; white-space: nowrap; border-bottom: 1px solid var(--border-md); }
  thead th.col-name { width: 25%; text-align: left; } thead th.col-leg { width: 80px; text-align: left; }
  thead th.col-turno { width: 100px; text-align: left; } thead th.col-fi { width: 110px; text-align: left; }
  thead th.day { text-align: center; width: 36px; padding: 10px 4px; }
  thead th.day.weekend { background: #ebe8e2; }
  .sector-row td { background: #f8f6f2; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); padding: 8px 12px; border-top: 1px solid var(--border-md); }
  .sector-count { font-weight: 400; color: var(--hint); margin-left: 6px; }
  tbody tr.emp { border-bottom: 1px solid var(--border); }
  tbody tr.emp:hover { background: #fafaf8; }
  td { padding: 8px 12px; vertical-align: middle; }
  td.name { font-weight: 500; width: 25%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  td.leg { width: 80px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
  td.turno { width: 100px; color: var(--muted); }
  td.fi { width: 110px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--hint); }
  td.day-cell { text-align: center; padding: 8px 2px; }
  .dot-aus { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--red-bg); color: var(--red); font-size: 12px; font-weight: 600; }
  .dot-ok { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--green-bg); color: var(--green); font-size: 12px; font-weight: 600; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 5px; font-weight: 600; }
  .badge-t1 { background: var(--blue-bg); color: var(--blue); }
  .badge-t2 { background: var(--amber-bg); color: var(--amber); }
  #no-data { text-align: center; padding: 48px; color: var(--hint); font-size: 13px; }
</style>

}}},{"legajo":"7787","nombre":"Victor Damian Rotela Sanchez","sector":"SALA DE FILETEADOS","turno":"Turno 1","fi":"04/03/2025","aus":{"2026-04-30":{"g":true,"c":"Traslado de sector"}}},{"legajo":"10327","nombre":"Vidalia Marlene Samaniego Ayala","sector":"SALA DE FILETEADOS","turno":"Turno 1","fi":"28/04/2026","aus":{"2026-04-27":{"g":false,"c":""}}},{"legajo":"10075","nombre":"Viviana Elizabeth Benítez Orrego","sector":"SALA DE FILETEADOS","turno":"Turno 1","fi":"06/04/2026","aus":{}},{"legajo":"10338","nombre":"Yemima Raquel Ruiz Diaz Irala","sector":"SALA DE FILETEADOS","turno":"Turno 1","fi":"28/04/2026","aus":{"2026-04-27":{"g":false,"c":""}}},{"legajo":"10340","nombre":"Yesika Maria Ortiz De Sanchez","sector":"SALA DE FILETEADOS","turno":"Turno 1","fi":"28/04/2026","aus":{"2026-04-27":{"g":false,"c":""}}}];
var EXCLUIR = ["LIMPIEZA PREOPERACIONAL","ADMINISTRACION DE PRODUCCION"];
var MESES_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
var DIAS_ES = ['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
var FECHAS_VISIBLES = FECHAS;

function parseDate(s) {
  var p = s.split('-');
  return new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
}

function actualizarFechasVisibles() {
  var fMes = document.getElementById('f-mes').value;
  FECHAS_VISIBLES = fMes ? FECHAS.filter(function(f){ return f.substring(0,7) === fMes; }) : FECHAS;
}

function buildHeader() {
  var hoy = new Date(); hoy.setHours(0,0,0,0);
  var todayStr = hoy.getFullYear() + '-' + String(hoy.getMonth()+1).padStart(2,'0') + '-' + String(hoy.getDate()).padStart(2,'0');
  var html = '<tr><th class="col-name">Empleado</th><th class="col-leg">Legajo</th><th class="col-turno">Turno</th><th class="col-fi">Ingreso</th>';
  for (var i=0; i<FECHAS_VISIBLES.length; i++) {
    var f = FECHAS_VISIBLES[i];
    var d = parseDate(f);
    var dow = d.getDay();
    var isWeekend = dow === 0 || dow === 6;
    var isHoy = f === todayStr;
    var dia = d.getDate();
    var diaLabel = isHoy ? '<b style="color:#185fa5">' + dia + '</b>' : dia;
    html += '<th class="day' + (isWeekend?' weekend':'') + '">' + diaLabel + '<br><span style="font-size:9px">' + DIAS_ES[dow] + '</span></th>';
  }
  html += '</tr>';
  document.getElementById('thead').innerHTML = html;
}

function buildFilters() {
  var s = {};
  for (var i=0; i<ROWS.length; i++) {
    if (ROWS[i].sector && EXCLUIR.indexOf(ROWS[i].sector) === -1 && ROWS[i].sector.trim() !== "") s[ROWS[i].sector] = 1;
  }
  var sel = document.getElementById('f-sector');
  Object.keys(s).sort().forEach(function(sec) {
    var o = document.createElement('option'); o.value = sec; o.textContent = sec; sel.appendChild(o);
  });
  var meses = {};
  for (var i=0; i<FECHAS.length; i++) { meses[FECHAS[i].substring(0,7)] = 1; }
  var selMes = document.getElementById('f-mes');
  Object.keys(meses).sort().forEach(function(m) {
    var p = m.split('-');
    var o = document.createElement('option'); o.value = m;
    o.textContent = MESES_ES[parseInt(p[1])-1] + ' ' + p[0];
    selMes.appendChild(o);
  });
}

function render() {
  var hoy = new Date(); hoy.setHours(0,0,0,0);
  var todayStr = hoy.getFullYear() + '-' + String(hoy.getMonth()+1).padStart(2,'0') + '-' + String(hoy.getDate()).padStart(2,'0');
  var fNombre = document.getElementById('f-nombre').value.toLowerCase();
  var fSector = document.getElementById('f-sector').value;
  var fTurno  = document.getElementById('f-turno').value;
  var fMes    = document.getElementById('f-mes').value;

  var filtered = ROWS.filter(function(r) {
    return EXCLUIR.indexOf(r.sector) === -1 && r.sector.trim() !== "" &&
           (!fNombre || r.nombre.toLowerCase().indexOf(fNombre) >= 0 || r.legajo.indexOf(fNombre) >= 0) &&
           (!fSector || r.sector === fSector) &&
           (!fTurno  || r.turno === fTurno);
  });

  var sectMap = {};
  for (var i=0; i<filtered.length; i++) {
    var sec = filtered[i].sector;
    if (!sectMap[sec]) sectMap[sec] = [];
    sectMap[sec].push(filtered[i]);
  }
  var sectores = Object.keys(sectMap).sort();
  var html = '';
  for (var s=0; s<sectores.length; s++) {
    var sec = sectores[s];
    var filas = sectMap[sec].sort(function(a,b){ return parseInt(a.legajo) - parseInt(b.legajo); });
    html += '<tr class="sector-row"><td colspan="' + (4 + FECHAS_VISIBLES.length) + '">' + sec + '<span class="sector-count">' + filas.length + ' personas</span></td></tr>';
    for (var r=0; r<filas.length; r++) {
      var row = filas[r];
      var badgeClass = row.turno === 'Turno 1' ? 'badge-t1' : 'badge-t2';
      html += '<tr class="emp"><td class="name" title="' + row.nombre + '">' + row.nombre + '</td>';
      html += '<td class="leg">' + row.legajo + '</td>';
      html += '<td class="turno"><span class="badge ' + badgeClass + '">' + row.turno + '</span></td>';
      html += '<td class="fi">' + (row.fi || '-') + '</td>';
      for (var f=0; f<FECHAS_VISIBLES.length; f++) {
        var fecha = FECHAS_VISIBLES[f];
        if (fecha in row.aus) {
          var coment = row.aus[fecha].c || "";
          var tip = coment ? " title=\"" + coment + "\"" : "";
          html += "<td class=\"day-cell\"><span class=\"dot-aus\"" + tip + ">&#10007;</span></td>";
        } else {
          html += '<td class="day-cell"><span class="dot-ok">&#10003;</span></td>';
        }
      }
      html += '</tr>';
    }
  }

  var tbody = document.getElementById('tbody');
  var noData = document.getElementById('no-data');
  if (filtered.length === 0) { tbody.innerHTML = ''; noData.style.display = 'block'; }
  else { tbody.innerHTML = html; noData.style.display = 'none'; }

  var dotacion = filtered.length;
  var ausHoy = 0, gestHoy = 0;
  for (var i=0; i<filtered.length; i++) {
    if (todayStr in filtered[i].aus) {
      ausHoy++;
      if (filtered[i].aus[todayStr]) gestHoy++;
    }
  }
  var pendHoy = ausHoy - gestHoy;
  var pct = dotacion > 0 ? ((dotacion - ausHoy) / dotacion * 100).toFixed(1) + '%' : '-';
  document.getElementById('m-dot').textContent  = dotacion;
  document.getElementById('m-aus').textContent  = ausHoy;
  document.getElementById('m-gest').textContent = gestHoy;
  document.getElementById('m-pend').textContent = pendHoy;
  document.getElementById('m-pct').textContent  = pct;
}

actualizarFechasVisibles();
buildHeader();
buildFilters();
render();

document.getElementById('f-nombre').addEventListener('input', render);
document.getElementById('f-sector').addEventListener('change', render);
document.getElementById('f-turno').addEventListener('change', render);
document.getElementById('f-mes').addEventListener('change', function(){
  actualizarFechasVisibles();
  buildHeader();
  render();
});
</script>
