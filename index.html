<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Presentismo — KZero</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f5f2; --surface: #ffffff; --border: rgba(0,0,0,0.08);
    --border-md: rgba(0,0,0,0.14); --text: #1a1a18; --muted: #6b6b67;
    --hint: #a0a09c; --green: #1d9e75; --green-bg: #e1f5ee;
    --red: #d85a30; --red-bg: #faece7; --amber: #ba7517; --amber-bg: #faeeda;
    --blue: #185fa5; --blue-bg: #e6f1fb; --radius: 10px;
    --topbar-h: 56px; --metrics-h: 82px; --filters-h: 50px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; zoom: 1.1; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 12px; height: var(--topbar-h); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .brand { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .brand span { color: var(--muted); font-weight: 400; }
  .updated { font-size: 12px; color: var(--hint); font-family: 'DM Mono', monospace; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; padding: 10px 12px; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 14px; }
  .metric-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .metric-value { font-size: 22px; font-weight: 600; letter-spacing: -1px; line-height: 1; }
  .metric-value.g { color: var(--green); } .metric-value.r { color: var(--red); } .metric-value.b { color: var(--blue); }
  .filters { display: flex; gap: 8px; padding: 8px 12px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .filters select, .filters input { font-family: 'DM Sans', sans-serif; font-size: 13px; border: 1px solid var(--border-md); border-radius: 8px; padding: 5px 10px; background: var(--surface); color: var(--text); outline: none; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .filters input[type="text"] { width: 140px; }
  .filters input[type="date"] { width: 130px; }
  .filter-label { font-size: 12px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
  .filter-sep { font-size: 12px; color: var(--hint); flex-shrink: 0; }
  .table-outer { padding: 0 12px 24px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background: var(--surface); font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius); }
  thead th { background: #f0ede8; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); padding: 10px 12px; white-space: nowrap; border-bottom: 1px solid var(--border-md); }
  thead th.col-name { width: 25%; text-align: left; } thead th.col-leg { width: 80px; text-align: left; }
  thead th.col-turno { width: 100px; text-align: left; } thead th.col-fi { width: 110px; text-align: left; }
  thead th.day { text-align: center; width: 36px; padding: 10px 4px; }
  thead th.day.weekend { background: #ebe8e2; }
  .sector-row td { background: #f8f6f2; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); padding: 8px 12px; border-top: 1px solid var(--border-md); }
  .sector-count { font-weight: 400; color: var(--hint); margin-left: 6px; }
  tbody tr.emp { border-bottom: 1px solid var(--border); }
  tbody tr.emp:hover { background: #fafaf8; }
  td { padding: 8px 12px; vertical-align: middle; }
  td.name { font-weight: 500; width: 25%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  td.leg { width: 80px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
  td.turno { width: 100px; color: var(--muted); }
  td.fi { width: 110px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--hint); }
  td.day-cell { text-align: center; padding: 8px 2px; }
  .dot-aus { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--red-bg); color: var(--red); font-size: 12px; font-weight: 600; cursor: pointer; }
  .dot-ok { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--green-bg); color: var(--green); font-size: 12px; font-weight: 600; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 5px; font-weight: 600; }
  .badge-t1 { background: var(--blue-bg); color: var(--blue); }
  .badge-t2 { background: var(--amber-bg); color: var(--amber); }
  #no-data { text-align: center; padding: 48px; color: var(--hint); font-size: 13px; }


  .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:1000; align-items:center; justify-content:center; }
  .modal-overlay.active { display:flex; }
  .modal-box { background:var(--surface); border-radius:var(--radius); padding:24px; max-width:320px; width:90%; box-shadow:0 8px 32px rgba(0,0,0,0.15); }
  .modal-title { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px; }
  .modal-nombre { font-size:15px; font-weight:600; margin-bottom:4px; }
  .modal-fecha { font-size:12px; color:var(--muted); margin-bottom:12px; }
  .modal-coment { font-size:13px; color:var(--text); background:var(--bg); border-radius:8px; padding:10px 12px; }
  .modal-nocoment { font-size:13px; color:var(--hint); font-style:italic; }
  .modal-close { margin-top:16px; width:100%; padding:10px; border:none; border-radius:8px; background:var(--bg); color:var(--text); font-size:13px; cursor:pointer; font-family:'DM Sans',sans-serif; }

  /* Tabs */
  .tabs { display:flex; gap:8px; padding:12px 24px; background:var(--surface); border-bottom:2px solid var(--border); }
  .tab-btn { font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; padding:10px 24px; border:2px solid var(--border-md); border-radius:10px; background:var(--bg); cursor:pointer; color:var(--muted); transition:all .18s; letter-spacing:-0.2px; }
  .tab-btn:hover { background:var(--surface); color:var(--text); border-color:var(--blue); }
  .tab-btn.active { background:var(--blue); color:#fff; border-color:var(--blue); box-shadow:0 2px 8px rgba(24,95,165,0.18); }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  /* Filtros marcaciones */
  .fich-filters { display:flex; gap:8px; padding:8px 24px; flex-wrap:wrap; align-items:center; border-bottom:1px solid var(--border); overflow-x:auto; }
  .fich-filters select, .fich-filters input { font-family:'DM Sans',sans-serif; font-size:13px; border:1px solid var(--border-md); border-radius:8px; padding:5px 10px; background:var(--surface); color:var(--text); outline:none; cursor:pointer; flex-shrink:0; }
  .fich-filters input[type="text"] { width:160px; }
  .fich-filters input[type="date"] { width:130px; }

  /* Tabla marcaciones */
  .fich-outer { padding:0 24px 40px; overflow-x:auto; }
  .fich-table { width:100%; border-collapse:collapse; background:var(--surface); font-size:13px; border:1px solid var(--border); border-radius:var(--radius); }
  .fich-table thead th { background:#f0ede8; font-weight:500; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); padding:10px 12px; white-space:nowrap; border-bottom:1px solid var(--border-md); text-align:left; }
  .fich-table tbody tr { border-bottom:1px solid var(--border); }
  .fich-table tbody tr:hover { background:#fafaf8; }
  .fich-table td { padding:8px 12px; vertical-align:middle; }
  .fich-table td.f-leg { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); width:80px; }
  .fich-table td.f-hora { font-family:'DM Mono',monospace; font-size:12px; width:80px; }
  .fich-table td.f-fecha { font-family:'DM Mono',monospace; font-size:11px; color:var(--hint); width:100px; }
  .fich-table td.f-maq { font-size:12px; color:var(--muted); }
  .badge-maq { display:inline-block; font-size:10px; padding:2px 7px; border-radius:5px; font-weight:600; background:var(--blue-bg); color:var(--blue); }
  .badge-maq.ev { background:var(--green-bg); color:var(--green); }
  .badge-maq.co { background:var(--amber-bg); color:var(--amber); }
  .badge-maq.ca { background:var(--blue-bg); color:var(--blue); }
  .fich-pager { display:flex; align-items:center; justify-content:space-between; padding:10px 24px 24px; font-size:13px; color:var(--muted); }
  .fich-pager-btns { display:flex; gap:6px; }
  .fich-pager-btn { font-family:'DM Sans',sans-serif; font-size:12px; padding:5px 12px; border:1px solid var(--border-md); border-radius:7px; background:var(--surface); color:var(--text); cursor:pointer; }
  .fich-pager-btn:disabled { opacity:0.35; cursor:default; }
  .fich-pager-btn.active { background:var(--blue); color:#fff; border-color:var(--blue); }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">Presentismo <span>/ KZero</span></div>
  <div class="updated">Actualizado: 11/05/2026 14:28</div>
</div>
<div class="metrics">
  <div class="metric"><div class="metric-label">Dotaci&oacute;n</div><div class="metric-value b" id="m-dot">-</div></div>
  <div class="metric"><div class="metric-label">Ausentes hoy</div><div class="metric-value r" id="m-aus">-</div></div>
  <div class="metric"><div class="metric-label">Gestionados</div><div class="metric-value g" id="m-gest">-</div></div>
  <div class="metric"><div class="metric-label">Pendientes</div><div class="metric-value r" id="m-pend">-</div></div>
  <div class="metric"><div class="metric-label">% Presentismo</div><div class="metric-value" id="m-pct">-</div></div>
</div>
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('presentismo')">Presentismo</button>
  <button class="tab-btn" onclick="switchTab('marcaciones')">Marcaciones</button>
</div>

<!-- TAB: Presentismo -->
<div class="tab-panel active" id="tab-presentismo">
<div class="filters">
  <span class="filter-label">Filtrar:</span>
  <input type="text" id="f-nombre" placeholder="Nombre o legajo...">
  <select id="f-sector"><option value="">Todos los sectores</option></select>
  <select id="f-turno"><option value="">Todos los turnos</option><option>Turno 1</option><option>Turno 2</option></select>
  <span class="filter-label">Desde:</span>
  <input type="date" id="f-desde">
  <span class="filter-sep">—</span>
  <span class="filter-label">Hasta:</span>
  <input type="date" id="f-hasta">
</div>
<div class="table-outer">
  <table id="tabla"><thead id="thead"></thead><tbody id="tbody"></tbody></table>
  <div id="no-data" style="display:none">Sin resultados.</div>
</div>
</div>

<!-- TAB: Marcaciones -->
<div class="tab-panel" id="tab-marcaciones">
<div class="fich-filters">
  <span class="filter-label">Filtrar:</span>
  <input type="text" id="ff-nombre" placeholder="Nombre o legajo..." oninput="renderFichajes()">
  <select id="ff-sector-fich" onchange="renderFichajes()">
    <option value="">Todos los sectores</option>
  </select>
  <select id="ff-maquina" onchange="renderFichajes()">
    <option value="">Todas las m&aacute;quinas</option>
    <option value="EVISCERACION">EVISCERACION</option>
    <option value="CORTES">CORTES</option>
    <option value="CAMARA">CAMARA</option>
  </select>
  <span class="filter-label">Desde:</span>
  <input type="date" id="ff-desde" onchange="renderFichajes()">
  <span class="filter-sep">&mdash;</span>
  <span class="filter-label">Hasta:</span>
  <input type="date" id="ff-hasta" onchange="renderFichajes()">
</div>
<div id="fich-loading" style="text-align:center;padding:32px;color:var(--hint);font-size:13px">Cargando fichajes...</div>
<div class="fich-outer">
  <table class="fich-table"><thead><tr>
    <th>Empleado</th><th>Legajo</th><th>Sector</th><th>Fecha</th><th>Entrada</th><th>Salida</th><th>M&aacute;quina</th>
  </tr></thead><tbody id="fich-tbody"></tbody></table>
  <div id="fich-no-data" style="display:none;text-align:center;padding:48px;color:var(--hint);font-size:13px">Sin resultados.</div>
</div>
<div class="fich-pager" id="fich-pager" style="display:none">
  <span id="fich-pager-info"></span>
  <div class="fich-pager-btns" id="fich-pager-btns"></div>
</div>
</div>

<div class="modal-overlay" id="modal" onclick="cerrarModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">Ausencia</div>
    <div class="modal-nombre" id="modal-nombre"></div>
    <div class="modal-fecha" id="modal-fecha"></div>
    <div id="modal-coment"></div>
    <button class="modal-close" onclick="cerrarModal()">Cerrar</button>
  </div>
</div>
<script>





var FECHAS = ["2026-04-27","2026-04-28","2026-04-29","2026-04-30","2026-05-02","2026-05-04","2026-05-05","2026-05-06","2026-05-07","2026-05-08","2026-05-09","2026-05-10","2026-05-11"];
var ROWS = [];
var FICHAJES = [];
var EXCLUIR = ["LIMPIEZA PREOPERACIONAL","ADMINISTRACION DE PRODUCCION"];
var MESES_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
var DIAS_ES = ["Dom","Lun","Mar","Mie","Jue","Vie","Sab"];
var FECHAS_VISIBLES = FECHAS;

function parseDate(s) {
  var p = s.split("-");
  return new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
}

function dateToStr(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function abrirModal(nombre, fecha, coment) {
  document.getElementById("modal-nombre").textContent = nombre;
  var d = parseDate(fecha);
  document.getElementById("modal-fecha").textContent = DIAS_ES[d.getDay()] + " " + d.getDate() + " de " + MESES_ES[d.getMonth()] + " " + d.getFullYear();
  var mc = document.getElementById("modal-coment");
  if (coment && coment.trim() !== "") {
    mc.innerHTML = '<div class="modal-coment">' + coment + '</div>';
  } else {
    mc.innerHTML = '<div class="modal-nocoment">Sin comentario registrado</div>';
  }
  document.getElementById("modal").classList.add("active");
}

function cerrarModal() {
  document.getElementById("modal").classList.remove("active");
}

function inicializarFechas() {
  var hoy = new Date(); hoy.setHours(0,0,0,0);
  var hace14 = new Date(hoy); hace14.setDate(hoy.getDate() - 13);
  document.getElementById("f-desde").value = dateToStr(hace14);
  document.getElementById("f-hasta").value = dateToStr(hoy);
}

function actualizarFechasVisibles() {
  var desde = document.getElementById("f-desde").value;
  var hasta = document.getElementById("f-hasta").value;
  if (desde && hasta) {
    FECHAS_VISIBLES = FECHAS.filter(function(f){ return f >= desde && f <= hasta; });
  } else {
    FECHAS_VISIBLES = FECHAS;
  }
}

function buildHeader() {
  var hoy = new Date(); hoy.setHours(0,0,0,0);
  var todayStr = dateToStr(hoy);
  var html = '<tr><th class="col-name">Empleado</th><th class="col-leg">Legajo</th><th class="col-turno">Turno</th><th class="col-fi">Ingreso</th>';
  for (var i=0; i<FECHAS_VISIBLES.length; i++) {
    var f = FECHAS_VISIBLES[i];
    var d = parseDate(f);
    var dow = d.getDay();
    var isWeekend = dow === 0 || dow === 6;
    var isHoy = f === todayStr;
    var dia = d.getDate();
    var diaLabel = isHoy ? '<b style="color:#185fa5">' + dia + '</b>' : dia;
    html += '<th class="day' + (isWeekend?" weekend":"") + '">' + diaLabel + '<br><span style="font-size:9px">' + DIAS_ES[dow] + '</span></th>';
  }
  html += '</tr>';
  document.getElementById("thead").innerHTML = html;
}

function buildFilters() {
  var s = {};
  for (var i=0; i<ROWS.length; i++) {
    if (ROWS[i].sector && EXCLUIR.indexOf(ROWS[i].sector) === -1 && ROWS[i].sector.trim() !== "") s[ROWS[i].sector] = 1;
  }
  var sel = document.getElementById("f-sector");
  Object.keys(s).sort().forEach(function(sec) {
    var o = document.createElement("option"); o.value = sec; o.textContent = sec; sel.appendChild(o);
  });
}

function render() {
  var hoy = new Date(); hoy.setHours(0,0,0,0);
  var todayStr = dateToStr(hoy);
  var fNombre = document.getElementById("f-nombre").value.toLowerCase();
  var fSector = document.getElementById("f-sector").value;
  var fTurno  = document.getElementById("f-turno").value;

  var filtered = ROWS.filter(function(r) {
    return EXCLUIR.indexOf(r.sector) === -1 && r.sector.trim() !== "" &&
           (!fNombre || r.nombre.toLowerCase().indexOf(fNombre) >= 0 || r.legajo.indexOf(fNombre) >= 0) &&
           (!fSector || r.sector === fSector) &&
           (!fTurno  || r.turno === fTurno);
  });

  var sectMap = {};
  for (var i=0; i<filtered.length; i++) {
    var sec = filtered[i].sector;
    if (!sectMap[sec]) sectMap[sec] = [];
    sectMap[sec].push(filtered[i]);
  }
  var sectores = Object.keys(sectMap).sort();
  var html = "";
  for (var s=0; s<sectores.length; s++) {
    var sec = sectores[s];
    var filas = sectMap[sec].sort(function(a,b){ return parseInt(a.legajo) - parseInt(b.legajo); });
    html += '<tr class="sector-row"><td colspan="' + (4 + FECHAS_VISIBLES.length) + '">' + sec + '<span class="sector-count">' + filas.length + ' personas</span></td></tr>';
    for (var r=0; r<filas.length; r++) {
      var row = filas[r];
      var badgeClass = row.turno === "Turno 1" ? "badge-t1" : "badge-t2";
      html += '<tr class="emp">';
      html += '<td class="name" title="' + row.nombre + '">' + row.nombre + '</td>';
      html += '<td class="leg">' + row.legajo + '</td>';
      html += '<td class="turno"><span class="badge ' + badgeClass + '">' + row.turno + '</span></td>';
      html += '<td class="fi">' + (row.fi || "-") + '</td>';
      for (var f=0; f<FECHAS_VISIBLES.length; f++) {
        var fecha = FECHAS_VISIBLES[f];
        if (fecha in row.aus) {
          var ausData = row.aus[fecha];
          var coment = (ausData.c || "").replace(/'/g, "&#39;");
          var nm = row.nombre.replace(/'/g, "&#39;");
          html += '<td class="day-cell"><span class="dot-aus" onclick="abrirModal(\'' + nm + '\',\'' + fecha + '\',\'' + coment + '\')">&#10007;</span></td>';
        } else {
          html += '<td class="day-cell"><span class="dot-ok">&#10003;</span></td>';
        }
      }
      html += '</tr>';
    }
  }

  var tbody = document.getElementById("tbody");
  var noData = document.getElementById("no-data");
  if (filtered.length === 0) { tbody.innerHTML = ""; noData.style.display = "block"; }
  else { tbody.innerHTML = html; noData.style.display = "none"; }

  var dotacion = filtered.length;
  var ausHoy = 0, gestHoy = 0;
  for (var i=0; i<filtered.length; i++) {
    if (todayStr in filtered[i].aus) {
      ausHoy++;
      if (filtered[i].aus[todayStr] && filtered[i].aus[todayStr].g) gestHoy++;
    }
  }
  var pendHoy = ausHoy - gestHoy;
  var pct = dotacion > 0 ? ((dotacion - ausHoy) / dotacion * 100).toFixed(1) + "%" : "-";
  document.getElementById("m-dot").textContent  = dotacion;
  document.getElementById("m-aus").textContent  = ausHoy;
  document.getElementById("m-gest").textContent = gestHoy;
  document.getElementById("m-pend").textContent = pendHoy;
  document.getElementById("m-pct").textContent  = pct;
}

function onFechaChange() {
  actualizarFechasVisibles();
  buildHeader();
  render();
}

inicializarFechas();
actualizarFechasVisibles();
buildHeader();
buildFilters();
render();

document.getElementById("f-nombre").addEventListener("input", render);
document.getElementById("f-sector").addEventListener("change", render);
document.getElementById("f-turno").addEventListener("change", render);
document.getElementById("f-desde").addEventListener("change", onFechaChange);
document.getElementById("f-hasta").addEventListener("change", onFechaChange);

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll(".tab-btn").forEach(function(b,i){
    b.classList.toggle("active", (i===0 && tab==="presentismo") || (i===1 && tab==="marcaciones"));
  });
  document.getElementById("tab-presentismo").classList.toggle("active", tab==="presentismo");
  document.getElementById("tab-marcaciones").classList.toggle("active", tab==="marcaciones");
  if (tab === "marcaciones") renderFichajes();
}

// ===== MARCACIONES =====
function inicializarFiltrosFichajes() {
  var hoy = new Date(); hoy.setHours(0,0,0,0);
  var hace14 = new Date(hoy); hace14.setDate(hoy.getDate() - 13);
  document.getElementById("ff-desde").value = dateToStr(hace14);
  document.getElementById("ff-hasta").value = dateToStr(hoy);
}

var FICH_PAGE = 0;
var FICH_PAGE_SIZE = 100;
var FICH_FILTERED = [];

function renderFichajes(resetPage) {
  if (resetPage === undefined || resetPage) FICH_PAGE = 0;
  var fNombre = document.getElementById("ff-nombre").value.toLowerCase();
  var fMaq    = document.getElementById("ff-maquina").value;
  var fSectFich = document.getElementById("ff-sector-fich").value;
  var fDesde  = document.getElementById("ff-desde").value;
  var fHasta  = document.getElementById("ff-hasta").value;

  FICH_FILTERED = FICHAJES.filter(function(f) {
    var fechaSolo = f.dt.substring(0,10);
    return (!fNombre || f.nombre.toLowerCase().indexOf(fNombre) >= 0 || f.legajo.indexOf(fNombre) >= 0) &&
           (!fMaq    || f.maquina === fMaq) &&
           (!fSectFich || f.sector === fSectFich) &&
           (!fDesde  || fechaSolo >= fDesde) &&
           (!fHasta  || fechaSolo <= fHasta);
  });
  FICH_FILTERED.sort(function(a,b){ return b.dt.localeCompare(a.dt); });

  // Agrupar por legajo+fecha: una fila con entrada y salida
  var grupos = {};
  var gruposOrder = [];
  for (var i=0; i<FICH_FILTERED.length; i++) {
    var f = FICH_FILTERED[i];
    var key = f.legajo + "|" + f.dt.substring(0,10);
    if (!grupos[key]) {
      grupos[key] = { legajo:f.legajo, nombre:f.nombre, sector:f.sector||"", fecha:f.dt.substring(0,10), maquina:f.maquina, marcas:[] };
      gruposOrder.push(key);
    }
    grupos[key].marcas.push(f.dt.substring(11,16));
  }
  // Ordenar marcas de cada grupo y reconstruir array plano
  var agrupado = gruposOrder.map(function(k) {
    var g = grupos[k];
    g.marcas.sort();
    g.entrada = g.marcas[0];
    g.salida  = g.marcas.length > 1 ? g.marcas[g.marcas.length-1] : "";
    return g;
  });
  FICH_FILTERED = agrupado;

  renderFichajesPagina();
}

function renderFichajesPagina() {
  var totalPages = Math.ceil(FICH_FILTERED.length / FICH_PAGE_SIZE);
  var start = FICH_PAGE * FICH_PAGE_SIZE;
  var end   = Math.min(start + FICH_PAGE_SIZE, FICH_FILTERED.length);
  var pagina = FICH_FILTERED.slice(start, end);

  var maqClass = { "EVISCERACION":"ev", "CORTES":"co", "CAMARA":"ca" };
  var html = "";
  for (var i=0; i<pagina.length; i++) {
    var f = pagina[i];
    var cls = maqClass[f.maquina] || "";
    var salidaHtml = f.salida ? f.salida : '<span style="color:var(--hint)">—</span>';
    html += "<tr>";
    html += "<td class=\"name\">" + f.nombre + "</td>";
    html += "<td class=\"f-leg\">" + f.legajo + "</td>";
    html += "<td class=\"f-maq\">" + (f.sector||"") + "</td>";
    html += "<td class=\"f-fecha\">" + f.fecha + "</td>";
    html += "<td class=\"f-hora\">" + f.entrada + "</td>";
    html += "<td class=\"f-hora\">" + salidaHtml + "</td>";
    html += "<td class=\"f-maq\"><span class=\"badge-maq " + cls + "\">" + f.maquina + "</span></td>";
    html += "</tr>";
  }

  var tbody  = document.getElementById("fich-tbody");
  var noData = document.getElementById("fich-no-data");
  var pager  = document.getElementById("fich-pager");
  var info   = document.getElementById("fich-pager-info");
  var btns   = document.getElementById("fich-pager-btns");

  if (FICH_FILTERED.length === 0) {
    tbody.innerHTML = ""; noData.style.display = "block"; pager.style.display = "none";
    return;
  }
  noData.style.display = "none";
  tbody.innerHTML = html;

  // Paginador
  info.textContent = (start+1) + "-" + end + " de " + FICH_FILTERED.length + " registros";
  var bHtml = "";
  bHtml += "<button class=\"fich-pager-btn\" onclick=\"fichPage(" + (FICH_PAGE-1) + ")\" " + (FICH_PAGE===0?"disabled":"") + ">&#8592; Ant</button>";
  var maxBtns = 5;
  var startP = Math.max(0, FICH_PAGE - 2);
  var endP   = Math.min(totalPages, startP + maxBtns);
  for (var p=startP; p<endP; p++) {
    bHtml += "<button class=\"fich-pager-btn" + (p===FICH_PAGE?" active":"") + "\" onclick=\"fichPage(" + p + ")\">" + (p+1) + "</button>";
  }
  bHtml += "<button class=\"fich-pager-btn\" onclick=\"fichPage(" + (FICH_PAGE+1) + ")\" " + (FICH_PAGE>=totalPages-1?"disabled":"") + ">Sig &#8594;</button>";
  btns.innerHTML = bHtml;
  pager.style.display = "flex";
}

function fichPage(p) {
  FICH_PAGE = p;
  renderFichajesPagina();
  document.getElementById("tab-marcaciones").scrollIntoView({behavior:"smooth",block:"start"});
}

inicializarFiltrosFichajes();

// Cargar fichajes.json dinámicamente
fetch('fichajes.json?v=' + Date.now())
  .then(function(r){ return r.json(); })
  .then(function(data){
    FICHAJES = data;
    // Poblar selector de sectores
    var secSet = {}; FICHAJES.forEach(function(f){ if(f.sector) secSet[f.sector]=1; });
    var selSec = document.getElementById("ff-sector-fich");
    Object.keys(secSet).sort().forEach(function(s){ var o=document.createElement("option"); o.value=s; o.textContent=s; selSec.appendChild(o); });
    if (document.getElementById("tab-marcaciones").classList.contains("active")) {
      renderFichajes();
    }
    document.getElementById("fich-loading").style.display = "none";
  })
  .catch(function(){
    document.getElementById("fich-loading").textContent = "No se pudo cargar fichajes.json";
  });
</script>
